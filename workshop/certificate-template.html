<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play right with AI - 完成證書</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .certificate-container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .certificate-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .certificate-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .certificate-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .certificate-title {
            font-size: 36px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .certificate-subtitle {
            font-size: 24px;
            color: #666;
            letter-spacing: 3px;
        }

        .certificate-body {
            text-align: center;
            margin: 40px 0;
        }

        .recipient-name {
            font-size: 42px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
            text-decoration: underline;
            text-decoration-color: #764ba2;
            text-underline-offset: 8px;
        }

        .achievement-text {
            font-size: 20px;
            color: #555;
            line-height: 1.6;
            margin: 20px 0;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .badges-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .badge {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-icon {
            font-size: 20px;
        }

        .certificate-footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .signature {
            text-align: center;
        }

        .signature-line {
            width: 200px;
            height: 1px;
            background: #333;
            margin: 10px auto;
        }

        .signature-name {
            font-size: 14px;
            color: #666;
        }

        .qr-code {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }

        .certificate-id {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        @media print {
            body {
                background: white;
            }
            
            .certificate-container {
                box-shadow: none;
                max-width: 100%;
            }
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            animation: progressAnimation 2s ease-out;
        }

        @keyframes progressAnimation {
            from { width: 0%; }
            to { width: 100%; }
        }

        .editable {
            border-bottom: 2px dashed #ccc;
            padding: 2px 10px;
            cursor: text;
            transition: all 0.3s;
        }

        .editable:hover {
            background: #f0f0f0;
        }

        .editable:focus {
            outline: none;
            border-bottom-color: #667eea;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="certificate-container">
        <div class="certificate-header">
            <div class="certificate-logo">🎭🤖</div>
            <h1 class="certificate-title">Play right with AI</h1>
            <h2 class="certificate-subtitle">完成證書</h2>
        </div>

        <div class="certificate-body">
            <p class="achievement-text">茲證明</p>
            <h2 class="recipient-name editable" contenteditable="true">[你的名字]</h2>
            <p class="achievement-text">
                成功完成「Play right with AI」工作坊<br>
                掌握 AI 驅動的開發測試自循環工作流<br>
                展現卓越的 AI 編排能力
            </p>

            <div class="progress-bar">
                <div class="progress-fill">100% 完成</div>
            </div>

            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-value editable" contenteditable="true">8/8</span>
                    <span class="stat-label">章節完成</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value editable" contenteditable="true">2,500</span>
                    <span class="stat-label">獲得 XP</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value editable" contenteditable="true">Lv.6</span>
                    <span class="stat-label">最終等級</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value editable" contenteditable="true">12小時</span>
                    <span class="stat-label">學習時數</span>
                </div>
            </div>

            <div class="badges-container">
                <div class="badge">
                    <span class="badge-icon">🎵</span>
                    <span>新手指揮家</span>
                </div>
                <div class="badge">
                    <span class="badge-icon">🎭</span>
                    <span>測試大師</span>
                </div>
                <div class="badge">
                    <span class="badge-icon">🔍</span>
                    <span>除錯偵探</span>
                </div>
                <div class="badge">
                    <span class="badge-icon">🎼</span>
                    <span>AI交響樂家</span>
                </div>
            </div>

            <p class="achievement-text" style="font-size: 24px; color: #667eea; font-weight: bold;">
                🎊 AI 交響樂家 🎊
            </p>
        </div>

        <div class="certificate-footer">
            <div class="signature">
                <div class="signature-line"></div>
                <p class="signature-name">工作坊導師</p>
            </div>
            <div class="signature">
                <p class="editable" contenteditable="true" style="color: #666;">[日期]</p>
                <div class="signature-line"></div>
                <p class="signature-name">完成日期</p>
            </div>
            <div class="qr-code">
                QR Code
            </div>
        </div>

        <div class="certificate-id">
            證書編號: PWA-<span class="editable" contenteditable="true">2025-0001</span>
        </div>
    </div>

    <script>
        // 自動填入今天的日期
        const today = new Date().toLocaleDateString('zh-TW', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        document.querySelectorAll('.editable').forEach(element => {
            if (element.textContent === '[日期]') {
                element.textContent = today;
            }
        });

        // 列印功能
        function printCertificate() {
            window.print();
        }

        // 儲存為圖片功能（需要額外的庫如 html2canvas）
        function saveCertificate() {
            alert('證書已準備下載！');
        }

        // 添加按鈕控制（可選）
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();
                printCertificate();
            }
        });
    </script>
</body>
</html>
