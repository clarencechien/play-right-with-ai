    color: d73a4a
    description: "Something isn't working | 某些功能無法正常運作"
  
  - name: enhancement
    color: a2eeef
    description: "New feature or request | 新功能或請求"
  
  - name: documentation
    color: 0075ca
    description: "Improvements or additions to documentation | 文件改進或新增"
  
  - name: question
    color: d876e3
    description: "Further information is requested | 需要更多資訊"
  
  - name: help wanted
    color: 008672
    description: "Extra attention is needed | 需要額外協助"
  
  - name: good first issue
    color: 7057ff
    description: "Good for newcomers | 適合新手"
  
  # 章節標籤
  - name: chapter-1
    color: fbca04
    description: "Chapter 1: AI Conductor"
  
  - name: chapter-2
    color: fbca04
    description: "Chapter 2: First Movement"
  
  - name: chapter-3
    color: fbca04
    description: "Chapter 3: Second Movement"
  
  - name: chapter-4
    color: fbca04
    description: "Chapter 4: Third Movement"
  
  - name: chapter-5
    color: fbca04
    description: "Chapter 5: Fourth Movement"
  
  - name: chapter-6
    color: fbca04
    description: "Chapter 6: Final Movement"
  
  - name: chapter-7
    color: fbca04
    description: "Chapter 7: Variations"
  
  - name: chapter-8
