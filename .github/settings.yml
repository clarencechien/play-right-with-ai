# Repository settings
# These settings are synced to GitHub via https://github.com/apps/settings

repository:
  # 基本資訊
  name: play-right-with-ai
  description: "🎼 AI-driven self-cycling development workflow workshop | AI 驅動的自循環開發工作流程工作坊"
  homepage: https://playrightwithAI.com
  topics:
    - ai
    - playwright
    - testing
    - automation
    - workshop
    - education
    - ai-orchestration
    - claude
    - gemini
    - self-healing
    - traditional-chinese
    - online-workshop
  
  # 設定
  private: false
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  
  # 預設分支
  default_branch: main
  
  # 功能開關
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  allow_auto_merge: false
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# 標籤
