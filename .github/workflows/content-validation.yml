name: Content Validation

on:
  push:
    paths:
      - 'workshop/**'
      - 'prompts/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths:
      - 'workshop/**'
      - 'prompts/**'
      - 'docs/**'
      - '*.md'

jobs:
  validate-markdown:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 設定 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: 安裝 markdown 檢查工具
      run: |
        npm install -g markdownlint-cli
        npm install -g markdown-link-check
    
    - name: 檢查 Markdown 格式
      run: |
        markdownlint '**/*.md' --ignore node_modules --ignore .github
    
    - name: 檢查 Markdown 連結
      run: |
        find . -name "*.md" -not -path "./node_modules/*" -not -path "./.github/*" | \
        xargs -I {} markdown-link-check {} --config .markdown-link-check.json || true
    
    - name: 驗證繁體中文內容
      run: |
        # 檢查是否包含簡體中文字符
        for file in $(find workshop prompts -name "*.md" 2>/dev/null); do
          if grep -P '[\x{4E00}-\x{9FFF}]' "$file" | grep -E '(的|了|着|过|别|里|吗|么|儿|与|个|给|让|为|于)' > /dev/null; then
            echo "警告: $file 可能包含簡體中文字符"
          fi
        done

  validate-structure:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 驗證章節結構
      run: |
        # 檢查每個章節的必要檔案
        for i in {1..8}; do
          chapter_dir="workshop/chapter-$i"
          if [ -d "$chapter_dir" ]; then
            echo "檢查第 $i 章..."
            
            # 檢查必要檔案
            required_files=("README.md")
            for file in "${required_files[@]}"; do
              if [ ! -f "$chapter_dir/$file" ]; then
                echo "錯誤: $chapter_dir 缺少 $file"
                exit 1
              fi
            done
            
            # 檢查目錄結構
            required_dirs=("start-here" "example-output")
            for dir in "${required_dirs[@]}"; do
              if [ ! -d "$chapter_dir/$dir" ]; then
                echo "警告: $chapter_dir 缺少 $dir 目錄"
              fi
            done
          fi
        done
    
    - name: 驗證提示詞結構
      run: |
        if [ -d "prompts" ]; then
          # 檢查每個章節的提示詞
          for i in {1..8}; do
            prompt_file="prompts/chapter-$i-prompts.md"
            if [ ! -f "$prompt_file" ]; then
              echo "警告: 缺少第 $i 章的提示詞檔案"
            fi
          done
        fi

  validate-code-examples:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 設定 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: 安裝 ESLint 和 TypeScript
      run: |
        npm install -g eslint typescript @typescript-eslint/parser @typescript-eslint/eslint-plugin
    
    - name: 檢查 JavaScript/TypeScript 程式碼
      run: |
        # 尋找所有 JS/TS 檔案並進行語法檢查
        find workshop -name "*.js" -o -name "*.ts" | while read file; do
          if [[ "$file" == *.ts ]]; then
            tsc --noEmit "$file" || echo "TypeScript 檢查警告: $file"
          fi
        done
    
    - name: 檢查 HTML 範例
      run: |
        # 安裝 HTML 驗證工具
        npm install -g html-validate
        
        # 驗證 HTML 檔案
        find workshop sample-app-source -name "*.html" 2>/dev/null | while read file; do
          html-validate "$file" || echo "HTML 驗證警告: $file"
        done

  check-memory-bank:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 驗證 Memory Bank 檔案
      run: |
        # 檢查必要的 memory bank 檔案
        required_files=(
          "memory-bank/projectbrief.md"
          "memory-bank/productContext.md"
          "memory-bank/activeContext.md"
          "memory-bank/systemPatterns.md"
          "memory-bank/techContext.md"
          "memory-bank/progress.md"
        )
        
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "警告: 缺少 Memory Bank 檔案: $file"
          else
            echo "✓ 找到: $file"
          fi
        done