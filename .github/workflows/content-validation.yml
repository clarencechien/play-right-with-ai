name: Content Validation Pipeline

on:
  push:
    paths:
      - 'content/**'
      - 'scripts/**'
      - 'docs/**'
      - 'workshop/**'
  pull_request:
    paths:
      - 'content/**'
      - 'scripts/**'
      - 'docs/**'
      - 'workshop/**'
  workflow_dispatch:

jobs:
  validate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build content
        run: npm run build:content
        
      - name: Validate links
        run: npm run validate:links
        continue-on-error: true
        
      - name: Check content synchronization
        run: npm run sync:content
        
      - name: Run content tests
        run: npm test tests/content/
        continue-on-error: true
        
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: validation-reports
          path: |
            link-validation-report.json
            sync-report.json
            
      - name: Comment PR with validation results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 📋 Content Validation Report\n\n';
            
            try {
              const linkReport = JSON.parse(fs.readFileSync('link-validation-report.json', 'utf8'));
              comment += `### Link Validation\n`;
              comment += `- Total links: ${linkReport.summary.totalLinks}\n`;
              comment += `- Errors: ${linkReport.summary.errors}\n`;
              comment += `- Warnings: ${linkReport.summary.warnings}\n\n`;
              
              if (linkReport.errors.length > 0) {
                comment += `#### First 5 errors:\n`;
                linkReport.errors.slice(0, 5).forEach(err => {
                  comment += `- ${err.url} in ${err.file}:${err.line} - ${err.reason}\n`;
                });
                comment += '\n';
              }
            } catch (e) {
              comment += '⚠️ Link validation report not found\n\n';
            }
            
            try {
              const syncReport = JSON.parse(fs.readFileSync('sync-report.json', 'utf8'));
              comment += `### Content Synchronization\n`;
              comment += `- Issues found: ${syncReport.issues.total}\n`;
              if (syncReport.issues.total > 0) {
                comment += `- Missing files: ${syncReport.issues.missing.length}\n`;
                comment += `- Orphaned files: ${syncReport.issues.orphaned.length}\n`;
                comment += `- Outdated files: ${syncReport.issues.outdated.length}\n`;
              }
            } catch (e) {
              comment += '⚠️ Sync report not found\n\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  test-playwright:
    runs-on: ubuntu-latest
    needs: validate-content
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        
      - name: Start server
        run: |
          npm run docs:serve &
          sleep 5
          
      - name: Run Playwright tests
        run: npm run test:e2e
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30