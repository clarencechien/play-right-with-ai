name: 管理過期 Issues 和 PRs | Manage Stale Issues and PRs

on:
  schedule:
    # 每天 UTC 時間 01:30 執行
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v9
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        # Issue 設定
        stale-issue-message: |
          👋 這個 issue 已經 60 天沒有活動了。
          
          如果這個問題仍然相關，請留言告訴我們，否則它將在 7 天後被自動關閉。
          
          This issue has been inactive for 60 days. Please comment if this is still relevant, or it will be closed in 7 days.
        
        close-issue-message: |
          這個 issue 因為長時間沒有活動而被自動關閉。如果問題仍然存在，請隨時重新開啟。
          
          This issue was closed due to inactivity. Feel free to reopen if the issue persists.
        
        days-before-issue-stale: 60
        days-before-issue-close: 7
        stale-issue-label: 'stale'
        exempt-issue-labels: 'pinned,security,bug,enhancement'
        
        # PR 設定
        stale-pr-message: |
          👋 這個 PR 已經 30 天沒有活動了。
          
          請更新 PR 或告訴我們狀態，否則它將在 14 天後被自動關閉。
          
          This PR has been inactive for 30 days. Please update or comment on the status, or it will be closed in 14 days.
        
        close-pr-message: |
          這個 PR 因為長時間沒有活動而被自動關閉。如果你想繼續這項工作，請重新開啟 PR。
          
          This PR was closed due to inactivity. Please reopen if you'd like to continue this work.
        
        days-before-pr-stale: 30
        days-before-pr-close: 14
        stale-pr-label: 'stale'
        exempt-pr-labels: 'work-in-progress,ready-for-review'
        
        # 其他設定
        remove-stale-when-updated: true
        delete-branch: false
        
        # 操作限制（避免一次處理太多）
        operations-per-run: 30