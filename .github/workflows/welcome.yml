name: 歡迎新貢獻者 | Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        issue-message: |
          👋 歡迎來到 **Play right with AI** 工作坊！感謝你開啟你的第一個 issue。
          
          我們很高興你加入我們的學習社群！這是你第一次在這裡發布 issue，這裡有一些有用的資源：
          
          - 📚 [工作坊文件](../README.md)
          - 💬 [GitHub Discussions](../discussions) - 提問和分享經驗的好地方
          - 📖 [行為準則](../CODE_OF_CONDUCT.md) - 我們的社群準則
          - 🎯 [第一章：開始你的旅程](../workshop/chapter-01/README.md)
          
          如果你在學習過程中遇到困難，不要猶豫，社群在這裡幫助你！我們會盡快回應你的 issue。
          
          祝你在 AI 指揮之旅中學習愉快！🎼
          
          ---
          
          👋 Welcome to the **Play right with AI** workshop! Thank you for opening your first issue.
          
          We're excited to have you join our learning community! Since this is your first issue here, here are some helpful resources:
          
          - 📚 [Workshop Documentation](../README.md)
          - 💬 [GitHub Discussions](../discussions) - Great place for Q&A and sharing
          - 📖 [Code of Conduct](../CODE_OF_CONDUCT.md) - Our community guidelines
          - 🎯 [Chapter 1: Start Your Journey](../workshop/chapter-01/README.md)
          
          If you're stuck in your learning journey, don't hesitate - the community is here to help! We'll respond to your issue as soon as possible.
          
          Happy learning on your AI conductor journey! 🎼
        
        pr-message: |
          🎉 感謝你提交你的第一個 Pull Request 到 **Play right with AI** 工作坊！
          
          我們非常感謝你的貢獻！這是你在這個專案的第一個 PR，真是太棒了！
          
          **接下來的步驟：**
          1. 確保你的 PR 符合我們的[貢獻指南](../CONTRIBUTING.md)（如果有的話）
          2. 等待維護者的審查 - 我們會盡快查看
          3. 回應任何反饋或請求的更改
          
          **提醒事項：**
          - ✅ 確保所有檢查都通過
          - 📝 保持 PR 描述清晰完整
          - 💬 隨時在評論中提問
          
          再次感謝你幫助改進這個工作坊！你的貢獻將幫助更多開發者學習 AI 編排技能。
          
          ---
          
          🎉 Thank you for submitting your first Pull Request to the **Play right with AI** workshop!
          
          We really appreciate your contribution! This is your first PR in this project - that's awesome!
          
          **Next steps:**
          1. Make sure your PR follows our [Contributing Guidelines](../CONTRIBUTING.md) (if available)
          2. Wait for maintainer review - we'll take a look soon
          3. Respond to any feedback or requested changes
          
          **Reminders:**
          - ✅ Ensure all checks pass
          - 📝 Keep your PR description clear and complete
          - 💬 Feel free to ask questions in the comments
          
          Thanks again for helping improve this workshop! Your contribution will help more developers learn AI orchestration skills.