name: 自動標籤管理 | Auto Label Management

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: github.event_name == 'issues'
    
    steps:
    - name: 標籤 Issues | Label Issues
      uses: actions/github-script@v7
      with:
        script: |
          const issue = context.payload.issue;
          const title = issue.title.toLowerCase();
          const body = (issue.body || '').toLowerCase();
          const labels = [];
          
          // 根據標題前綴添加標籤
          if (title.includes('[bug]')) labels.push('bug');
          if (title.includes('[feature]')) labels.push('enhancement');
          if (title.includes('[help]')) labels.push('help wanted');
          if (title.includes('[feedback]')) labels.push('feedback');
          if (title.includes('[docs]')) labels.push('documentation');
          
          // 根據內容添加章節標籤
          const chapters = [
            { pattern: /chapter[\s-]*1|ai conductor/i, label: 'chapter-1' },
            { pattern: /chapter[\s-]*2|first movement/i, label: 'chapter-2' },
            { pattern: /chapter[\s-]*3|second movement/i, label: 'chapter-3' },
            { pattern: /chapter[\s-]*4|third movement/i, label: 'chapter-4' },
            { pattern: /chapter[\s-]*5|fourth movement/i, label: 'chapter-5' },
            { pattern: /chapter[\s-]*6|final movement/i, label: 'chapter-6' },
            { pattern: /chapter[\s-]*7|variations/i, label: 'chapter-7' },
            { pattern: /chapter[\s-]*8|capstone/i, label: 'chapter-8' }
          ];
          
          chapters.forEach(chapter => {
            if (chapter.pattern.test(title) || chapter.pattern.test(body)) {
              labels.push(chapter.label);
            }
          });
          
          // 根據技術關鍵字添加標籤
          if (body.includes('playwright')) labels.push('playwright');
          if (body.includes('claude') || body.includes('gemini')) labels.push('ai-tools');
          if (body.includes('測試') || body.includes('test')) labels.push('testing');
          if (body.includes('環境') || body.includes('setup')) labels.push('setup');
          
          // 添加優先級標籤
          if (body.includes('urgent') || body.includes('緊急')) labels.push('priority-high');
          if (body.includes('阻塞') || body.includes('blocking')) labels.push('priority-critical');
          
          // 如果是第一次貢獻者
          const creator = issue.user.login;
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            creator: creator,
            state: 'all'
          });
          
          if (issues.length === 1) {
            labels.push('first-time-contributor');
          }
          
          // 添加標籤
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labels
            });
          }

  label-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    if: github.event_name == 'pull_request'
    
    steps:
    - name: 檢出程式碼 | Checkout
      uses: actions/checkout@v4
      
    - name: 標籤 PRs | Label PRs
      uses: actions/labeler@v5
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        configuration-path: .github/labeler.yml