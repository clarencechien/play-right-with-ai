# 自動為 PR 添加標籤的配置
# Configuration for auto-labeling PRs

# 文件相關
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'
      - 'README.md'

# 工作坊章節
chapter-1:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-01/**'

chapter-2:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-02/**'

chapter-3:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-03/**'

chapter-4:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-04/**'

chapter-5:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-05/**'

chapter-6:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-06/**'

chapter-7:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-07/**'

chapter-8:
  - changed-files:
    - any-glob-to-any-file: 'workshop/chapter-08/**'

# 提示詞相關
prompts:
  - changed-files:
    - any-glob-to-any-file: 'prompts/**'

# 範例應用
sample-apps:
  - changed-files:
    - any-glob-to-any-file: 'sample-app-source/**'

# GitHub 相關
github:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'

# 測試相關
testing:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.test.js'
      - '**/*.spec.js'
      - '**/*.test.ts'
      - '**/*.spec.ts'
      - 'tests/**'
      - 'e2e/**'

# 配置檔案
config:
  - changed-files:
    - any-glob-to-any-file:
      - '*.json'
      - '*.yml'
      - '*.yaml'
      - '.env*'
      - '.*rc'
      - '*.config.js'
      - '*.config.ts'

# 依賴更新
dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'

# JavaScript/TypeScript
javascript:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'

# 大型變更
large-pr:
  - changed-files:
    - any-glob-to-any-file: '**'
    - file-count: '>10'

# 小型變更
small-pr:
  - changed-files:
    - any-glob-to-any-file: '**'
    - file-count: '<=3'