<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone 專案 - [專案名稱]</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🎯 Capstone 專案模板</h1>
            <p>請根據您的專案需求修改此模板</p>
        </header>

        <nav>
            <!-- 導航選單將在這裡 -->
        </nav>

        <main>
            <section class="welcome">
                <h2>開始您的 Capstone 專案</h2>
                <p>這個模板提供了基礎架構，幫助您快速開始開發。</p>
                
                <div class="quick-start">
                    <h3>快速開始步驟：</h3>
                    <ol>
                        <li>選擇您的專案主題</li>
                        <li>修改 index.html 結構</li>
                        <li>在 app.js 實作核心邏輯</li>
                        <li>撰寫測試案例</li>
                        <li>持續迭代改進</li>
                    </ol>
                </div>

                <div class="requirements">
                    <h3>專案需求檢查清單：</h3>
                    <ul id="requirementsList">
                        <li data-requirement="features">
                            <input type="checkbox" id="req1">
                            <label for="req1">至少 5 個功能模組</label>
                        </li>
                        <li data-requirement="crud">
                            <input type="checkbox" id="req2">
                            <label for="req2">完整 CRUD 操作</label>
                        </li>
                        <li data-requirement="persistence">
                            <input type="checkbox" id="req3">
                            <label for="req3">資料持久化</label>
                        </li>
                        <li data-requirement="tests">
                            <input type="checkbox" id="req4">
                            <label for="req4">測試覆蓋 > 80%</label>
                        </li>
                        <li data-requirement="responsive">
                            <input type="checkbox" id="req5">
                            <label for="req5">響應式設計</label>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- 您的應用程式內容將在這裡 -->
            <section id="appContent" class="app-content">
                <!-- 動態內容區域 -->
            </section>
        </main>

        <footer>
            <p>Capstone 專案 - AI Workshop 2024</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
