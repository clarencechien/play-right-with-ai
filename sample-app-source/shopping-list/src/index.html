<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能購物清單 - AI Workshop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 智能購物清單</h1>
            <div class="budget-section">
                <input type="number" id="budgetInput" data-testid="budget-input" placeholder="設定預算">
                <button id="setBudget" data-testid="set-budget">設定</button>
                <span data-testid="budget-display" id="budgetDisplay">預算: NT$ 0</span>
            </div>
        </header>

        <div class="add-section">
            <input 
                type="text" 
                id="itemName" 
                data-testid="item-name"
                placeholder="商品名稱"
                required
            >
            <input 
                type="number" 
                id="itemQuantity" 
                data-testid="item-quantity"
                placeholder="數量"
                min="1"
                value="1"
            >
            <select id="itemCategory" data-testid="item-category">
                <option value="食品">食品</option>
                <option value="日用品">日用品</option>
                <option value="電子產品">電子產品</option>
                <option value="服飾">服飾</option>
                <option value="其他">其他</option>
            </select>
            <input 
                type="number" 
                id="itemPrice" 
                data-testid="item-price"
                placeholder="單價(選填)"
                min="0"
            >
            <button id="addButton" data-testid="add-button">新增</button>
        </div>

        <div class="filter-section">
            <input 
                type="text" 
                id="searchInput" 
                data-testid="search-input"
                placeholder="搜尋商品..."
            >
            <select id="categoryFilter" data-testid="category-filter">
                <option value="all">所有分類</option>
                <option value="食品">食品</option>
                <option value="日用品">日用品</option>
                <option value="電子產品">電子產品</option>
                <option value="服飾">服飾</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <div id="shoppingList" class="shopping-list"></div>

        <div class="stats" data-testid="stats">
            <span id="totalCount">總計: 0</span>
            <span id="purchasedCount">已購買: 0</span>
            <span id="totalPrice">總價: NT$ 0</span>
        </div>

        <div class="action-buttons">
            <button id="clearPurchased" data-testid="clear-purchased">清除已購買</button>
            <button id="clearAll" data-testid="clear-all">清空清單</button>
            <button id="exportList" data-testid="export-list">匯出清單</button>
            <button id="shareList" data-testid="share-list">分享</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
