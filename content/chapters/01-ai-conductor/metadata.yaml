faqs:
  - question: "一定要使用所有提到的 AI 服務嗎？"
    answer: "不需要。至少有一個 AI 服務即可開始學習。建議從 Claude 或 GPT 開始。"
  - question: "為什麼選擇 Playwright 而不是 Selenium？"
    answer: "Playwright 提供更現代的 API、更好的效能、內建的等待機制，以及優秀的除錯工具。"
  - question: "雙語提示是否適用於所有 AI 模型？"
    answer: "大部分現代 AI 模型都支援雙語提示。效果可能因模型而異，建議實際測試。"
  - question: "如果環境設置遇到問題怎麼辦？"
    answer: "請參考 check-environment.js 腳本進行診斷，或在課程討論區尋求協助。"

notes:
  important:
    - "環境設置是整個工作坊的基礎，請確保完成所有步驟"
    - "至少需要一個 AI 服務才能進行後續章節"
    - "雙語提示策略是提升 AI 輸出品質的關鍵"
  
  tips:
    - "建議使用 Claude 作為主要 AI 服務，它對程式碼生成支援較好"
    - "保存成功的提示詞作為未來參考"
    - "定期更新開發工具以獲得最佳體驗"
  
  warnings:
    - "不要在提示詞中包含敏感資訊或 API 金鑰"
    - "AI 生成的程式碼需要審查後才能使用"
    - "確保環境變數設定正確，否則 AI 服務無法使用"