<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 頁面不存在 | Play Right with AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 120px;
      font-weight: 700;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
      animation: pulse 2s infinite;
    }
    
    h2 {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.95;
    }
    
    .countdown {
      font-size: 16px;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    
    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    a {
      display: inline-block;
      padding: 12px 30px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      background: #f8f9fa;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 30px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.8;
      }
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 80px;
      }
      
      h2 {
        font-size: 24px;
      }
      
      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎭</div>
    <h1>404</h1>
    <h2>哎呀！頁面不見了</h2>
    <p>您正在尋找的頁面可能已經移動、刪除，或者從未存在過。</p>
    <p class="countdown">將在 <span id="countdown">5</span> 秒後自動返回首頁...</p>
    
    <div class="links">
      <a href="./" onclick="goHome(event)">返回首頁</a>
      <a href="chapters/" onclick="goToChapters(event)">查看章節</a>
      <a href="playground/" onclick="goToPlayground(event)">前往 Playground</a>
    </div>
  </div>
  
  <script>
    // 自動重定向計時器
    let seconds = 5;
    const countdownElement = document.getElementById('countdown');
    
    const timer = setInterval(() => {
      seconds--;
      countdownElement.textContent = seconds;
      
      if (seconds <= 0) {
        clearInterval(timer);
        goHome();
      }
    }, 1000);
    
    // 智能路徑處理
    function getBasePath() {
      const path = window.location.pathname;
      const pathSegments = path.split('/').filter(Boolean);
      
      // 如果在 GitHub Pages 上
      if (path.includes('/play-right-with-ai/')) {
        const index = pathSegments.indexOf('play-right-with-ai');
        return '/' + pathSegments.slice(0, index + 1).join('/') + '/';
      }
      
      // 本地開發
      return '/';
    }
    
    function goHome(event) {
      if (event) event.preventDefault();
      const basePath = getBasePath();
      window.location.href = basePath;
    }
    
    function goToChapters(event) {
      if (event) event.preventDefault();
      const basePath = getBasePath();
      window.location.href = basePath + 'chapters/';
    }
    
    function goToPlayground(event) {
      if (event) event.preventDefault();
      const basePath = getBasePath();
      window.location.href = basePath + 'playground/';
    }
    
    // 取消自動重定向如果用戶點擊了連結
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        clearInterval(timer);
      });
    });
  </script>
</body>
</html>
